name: Flask CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      PROJECT_NAME: flask-calculator-api
      ARTIFACT_VERSION: ${{ github.run_number }}
      NEXUS_REPOSITORY: raw-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --junitxml=test-results.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: test-results.xml
      - name: Check SonarQube secrets
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "Erreur : SONAR_TOKEN est vide ou absent"
            exit 1
          else
            echo "SONAR_TOKEN est bien présent"
          fi

          if [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "Erreur : SONAR_HOST_URL est vide ou absent"
            exit 1
          else
            echo "SONAR_HOST_URL est bien présent"
          fi
      - name: Install SonarScanner
        run: |
          npm install -g sonarqube-scanner

      - name: SonarQube analysis
        run: |
          sonar-scanner \
            -Dsonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            -Dsonar.login="${{ secrets.SONAR_TOKEN }}"

      - name: Package application
        run: |
          mkdir -p dist
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='venv' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            -czf dist/${PROJECT_NAME}-${ARTIFACT_VERSION}.tar.gz .

      - name: Upload artifact in GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: flask-application
          path: dist/*.tar.gz

      - name: Upload artifact to Nexus
        run: |
          curl -u "${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }}" \
            --upload-file dist/${PROJECT_NAME}-${ARTIFACT_VERSION}.tar.gz \
            "${{ secrets.NEXUS_URL }}/repository/${NEXUS_REPOSITORY}/${PROJECT_NAME}/${PROJECT_NAME}-${ARTIFACT_VERSION}.tar.gz"
