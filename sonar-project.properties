sonar.projectKey=flask-calculator-api
sonar.projectName=Flask Calculator API
sonar.projectVersion=1.0

sonar.sources=.
sonar.tests=tests

sonar.inclusions=*.py
sonar.test.inclusions=tests/**/*.py

sonar.exclusions=tests/**,venv/**,__pycache__/**,.pytest_cache/**,.github/**,dist/**,coverage.xml,test-results.xml

sonar.python.version=3.9
sonar.python.coverage.reportPaths=coverage.xml
